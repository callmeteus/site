services:
  gio-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gio-site
    restart: unless-stopped
    networks:
      - cloudflared
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  cloudflared:
    external: true